                          description: "消息发送者。可能为以下值：\r\n- `user`：用户。\r\n- `assistant`：智能体。"
                        content:
                          type: string
                          description: 消息内容。
              #           tool_calls:
              #             type: array
              #             description: 工具调用信息。仅在 `role` 为 `assistant`，且本次消息触发了工具调用时返回。包含以下字段：
              #             items:
              #               type: object
              #               properties:
              #                 index:
              #                   type: integer
              #                   description: 工具调用索引。
              #                 type:
              #                   type: string
              #                   description: 工具调用类型。当前仅支持 `function`，即函数调用。
              #                 id:
              #                   type: string
              #                   description: 工具调用 ID。每次调用工具会为当前调用请求生成唯一的 ID。
              #                 function:
              #                   type: object
              #                   description: 函数调用信息。
              #                   properties:
              #                     name:
              #                       type: string
              #                       description: "函数名称。当前支持：\r\n-  `_publish_message`：向端侧发布消息。"
              #                     arguments:
              #                       type: string
              #                       description: 函数参数。
              #           tool_call_id:
              #             type: string
              #             description: 工具调用 ID。仅当 `role` 为 `tool` 时返回，对应 `content` 中反应了本次工具调用的结果。
              examples:
                Example 1:
                  value:
                    agent_id: xxxx
                    start_ts: 123
                    status: RUNNING
                    contents:
                      - role: user
                        content: hello.
                      - role: assistant
                        content: 'hi, how can I help you?'
                    #           tool_calls:
                    #             - index: 0
                    #               type: function
                    #               id: call_u9oldpnqdxxxxxxaqdkaqjzq
                    #               function:
                    #                 name: _publish_message
                    #                 arguments: '{"content": "你好"}'
                    #         - role: tool
                    #           content: '{"result": "ok"}'
                    #           tool_call_id: call_u9oldpnqdxxxxxxaqdkaqjzq
      operationId: get-history
      description: "获取用户和智能体对话的短期记忆。\r\n你可以在智能体运行期间 (`RUNNING`) 调用该 API 获取智能体创建到现在储存的短期记忆信息，包括：\r\n- 智能体创建和停止的时间戳\r\n- 用户和智能体对话消息"
components:
  parameters:
    appid:
      name: appid
      in: path
      description: '你的项目使用的 [App ID](http://doc.shengwang.cn/doc/convoai/restful/get-started/enable-service#%E8%8E%B7%E5%8F%96-app-id)。'
      required: true
      schema:
        type: string
    agentId:
      name: agentId
      in: path
      description: '智能体实例 ID，即智能体的唯一标识。调用 [POST 创建对话式智能体](https://doc.shengwang.cn/doc/convoai/restful/convoai/operations/start-agent) 成功后在响应包体中获取。'
      required: true
      schema:
        type: string
    phone_number:
      name: phone_number
      in: path
      description: E.164 格式的电话号码（如：+11234567890），作为唯一标识符。
      required: true
      schema:
        type: string
  responses:
    '200':
      description: |-
        - 若返回的状态码为 `200` 则表示请求成功。响应包体中包含本次请求的结果。
        - 若返回的状态码不为 `200` 则表示请求失败。响应包体中包含错误的类别和描述，你可以参考[响应状态码](https://doc.shengwang.cn/doc/convoai/restful/api/response-code)了解可能的原因。
      content:
        application/json:
          schema:
            type: object
            x-examples:
              Example 1:
                agent_id: 1NT29X10YHxxxxxWJOXLYHNYB
                create_ts: 1737111452
                state: RUNNING
            properties:
              agent_id:
                $ref: '#/components/schemas/agent_id'
                description: 智能体唯一标识。
              create_ts:
                $ref: '#/components/schemas/start_ts'
                description: 智能体创建时间戳。
              status:
                type: string
                description: "智能体运行状态：\r\n- `IDLE` (0)：空闲状态的智能体。\r\n- `STARTING` (1)：正在启动的智能体。\r\n- `RUNNING` (2)：正在运行的智能体。\r\n- `STOPPING` (3)：正在停止的智能体。\r\n- `STOPPED` (4)：已完成退出的智能体。\r\n- `RECOVERING` (5)：正在恢复的智能体。\r\n- `FAILED` (6)：执行失败的智能体。"
          examples:
            Example 1:
              value:
                agent_id: 1NT29X10YHxxxxxWJOXLYHNYB
                create_ts: 1737111452
                status: RUNNING
    phone_number_error:
      description: |
        若返回的 HTTP 状态码不为成功状态码，则表示请求失败。响应包体将包含一个 JSON 对象，其中包含错误的类型和描述。
        
        **可能的状态码及原因:**
        
        - 401 `unauthorized`：认证失败，请检查您的凭证。
        - 404 `not_found`：未找到指定的电话号码。
        - 409 `phone_number_exists`：电话号码已存在，不允许重复导入。
        - 409 `conflict`：并发修改冲突或资源被锁定。
        - 422 `unprocessable_content`：请求格式错误或参数校验失败。
        - 500 `internal_server_error`：服务器内部错误。
      content:
        application/json:
          schema:
            type: object
            properties:
              error_type:
                type: string
                description: 错误类型。
              description:
                type: string
                description: 错误描述。
          examples:
            Example 1:
              value:
                error_type: "unauthorized"
                description: "认证失败，请检查您的凭证。"
    outbound_call_error:
      description: |
        若返回的 HTTP 状态码不为 200，则表示请求失败。响应包体将包含一个 JSON 对象，其中包含错误的类型和描述。
        
        **可能的状态码及原因:**
        
        - 400 `invalid_phone_format`：电话号码格式无效（非 E.164 格式）。
        - 401 `unauthorized`：认证失败，请检查您的凭证。
        - 500 `internal_server_error`：服务器内部错误。
      content:
        application/json:
          schema:
            type: object
            properties:
              error_type:
                type: string
                description: 错误类型。
              description:
                type: string
                description: 错误描述。
          examples:
            Example 1:
              value:
                error_type: "invalid_phone_format"
                description: "电话号码格式无效（非E.164格式）。"
  schemas:
    voice_id:
      type: string
      title: voice_id
      description: '智能体音色 ID，支持的音色 ID 详见[音色 ID 表](https://doc.shengwang.cn/doc/convoai/doc/convoai/restful/api/voice-ids)。'
    max_history:
      type: integer
      description: LLM 中缓存的短期记忆条目数。取值范围为 `[1,1024]`。短期记忆包括用户和智能体对话消息、工具调用信息和时间戳。智能体和用户会单独记录短期记忆条目。
      default: 32
    tts_params:
      title: params
      description: |-
        TTS 配置参数。不同 TTS 供应商下该参数结构不同。
        > 各供应商示例代码中未提及的参数，声网对话式 AI 引擎不保证完全支持。
      oneOf:
        - $ref: '#/components/schemas/tts_minimax'
        - $ref: '#/components/schemas/tts_tencent'
        - $ref: '#/components/schemas/tts_bytedance'
        - $ref: '#/components/schemas/tts_microsoft'
        - $ref: '#/components/schemas/tts_cosyvoice'
        - $ref: '#/components/schemas/tts_duplex'
        - $ref: '#/components/schemas/tts_stepfun'
    tts_minimax:
      title: Minimax
      type: object
      additionalProperties: {}
      description: |-
        Minimax TTS，具体协议详见 [Minimax 官方文档](https://platform.minimaxi.com/document/T2A%20V2)。以下为示例：
        ```json
        "params": {
            "group_id": "xxxx",
            "key": "xxxx",
            "model": "speech-01-turbo",
            "voice_setting": {
                "voice_id": "female-shaonv",
                "speed": 1,
                "vol": 1,
                "pitch": 0,
                "emotion": "happy",
                "latex_read": True,
                "english_normalization": True,
            },
            "audio_setting": {
                "sample_rate": 16000
            },
            "pronunciation_dict": {
                "tone": ["这是/(zei3)(si4)", "消息/(xiao3)(xi4)"]
            },
            # voice_id和timber_weights二选一必填
            # "timber_weights": [{
            #     "voice_id": "male-qn-qingse",
            #     "weight": 1
            # },
            # {
            #     "voice_id": "female-shaonv",
            #     "weight": 5
            # }],
            "language_boost": "auto"
        }
        ```
    tts_tencent:
      title: Tencent
      type: object
      additionalProperties: {}
      description: |-
        腾讯云 TTS，具体协议详见[腾讯云官方文档](https://cloud.tencent.com/document/product/1073/94308)。以下为示例：
        ```json
        "params": {
            "app_id": "xxxx",
            "secret_id": "xxxx",
            "secret_key": "xxxx",
            "voice_type": 601005,
            "volume": 0,
            "speed": 0,
            "emotion_category": "happy",
            "emotion_intensity": 100
        }
        ```
    tts_bytedance:
      title: Bytedance
      type: object
      description: |-
        火山 TTS，具体协议详见[火山引擎官方文档](https://www.volcengine.com/docs/6561/79823)。以下为示例：
        ```json
        "params": {
            "token": "xxxxx",
            "app_id": "xxxx",
            "cluster": "volcano_tts",
            "voice_type": "BV700_streaming",
            "speed_ratio": 1.0,
            "volume_ratio": 1.0,
            "pitch_ratio": 1.0,
            "emotion": "happy"
        }
        ```
      additionalProperties: {}
    tts_cosyvoice:
      title: CosyVoice
      type: object
      additionalProperties: {}
      description: |-
        阿里云 CosyVoice TTS，具体协议详见[阿里云官方文档](https://help.aliyun.com/zh/model-studio/cosyvoice-large-model-for-speech-synthesis/)。以下为示例：
        ```json
        "params": {
          "api_key": "your_cosyvoice_api_key",
          "model": "cosyvoice-v1",
          "sample_rate": 16000,
          "voice": "longxiaochun"
        }
        ```
    tts_duplex:
      title: Bytedance Duplex
      type: object
      additionalProperties: {}
      description: |-
       火山引擎双向流式 TTS，具体协议详见[火山引擎官方文档](https://www.volcengine.com/docs/6561/1329505)。以下为示例：
        ```json
        "params": {
          "app_id": "your_bytedance_tts_app_id",
          "token": "your_bytedance_tts_token",
          "speaker": "zh_female_shuangkuaisisi_moon_bigtts"
        }
        ```
    tts_stepfun:
      title: StepFun
      type: object
      additionalProperties: {}
      description: |-
       阶跃星辰 TTS，具体协议详见[阶跃星辰官方文档](https://platform.stepfun.com/docs/api-reference/audio/ws_audio)。以下为示例：
        ```json
        "params": {
          "api_key": "your_stepfun_tts_key",
          "model": "step-tts-mini",
          "voice_id": "cixingnansheng"
        }
        ```

    priority:
      title: priority
      type: string
      description: |-
        播报行为的优先级，支持设为以下值：
        - `"INTERRUPT"`：（默认）高优先级，打断并播报。智能体会终止当前交互，直接播报消息。
        - `"APPEND"`: 中优先级，追加播报。智能体会在当前交互结束后播报消息。
        - `"IGNORE"`: 低优先级，空闲时播报。如果此时智能体正在交互，智能体会直接忽略并丢弃要播报的消息；只有智能体不在交互中才会播报消息。
    agent_id:
      title: agent_id
      type: string
      description: 对话式智能体 ID，即智能体唯一标识。
    channel:
      title: channel
      type: string
      description: 智能体所在 RTC 频道名。
    start_ts:
      title: start_ts
      type: integer
      description: 智能体创建时间戳。
    tts_microsoft:
      title: Microsoft
      type: object
      additionalProperties: {}
      description: |-
        微软 Azure TTS。以下为示例和参数说明：
        ```json
        "params": {
            "key": "<your_microsoft_key>",
            "region": "chinaeast2",
            "voice_name": "zh-CN-YunxiNeural",
            "speed": 1.0,
            "volume": 70
        }
        ```
        - `key`：（必需）String。微软 Azure 的 API key。
        - `region`：（必需）String。微软 TTS 服务的区域。
        - `voice_name`：（必需）String。音色。
        - `speed`：（可选）Number。语速。取值范围为 [0.5, 2.0]，默认值为 1.0。用于指示文本的语速。语速可以在单词或句子级别应用。
        - `volume`：（可选）Number。音量。取值范围为 [0.0, 100.0]，默认值为 100。例如，值为 75 表示音量设置为最大音量的 75%。
        - `sample_rate`：（可选）Integer。音频采样率 (Hz)。可选取值为 [16000, 24000, 48000]，默认值为 24000。

        > 更多信息请参考[微软官方文档](https://docs.azure.cn/zh-cn/ai-services/speech-service/)。
    asr_params:
      title: params
      description: |-
        ASR 配置参数。不同 ASR 供应商下该参数结构不同。
        > 各供应商示例代码中未提及的参数，声网对话式 AI 引擎不保证完全支持。
      oneOf:
        - $ref: '#/components/schemas/asr_tencent'
        - $ref: '#/components/schemas/asr_microsoft'
        - $ref: '#/components/schemas/asr_xfyun'
        - $ref: '#/components/schemas/asr_xfyun_bigmodel'
        - $ref: '#/components/schemas/asr_xfyun_dialect'
    asr_tencent:
      title: Tencent
      type: object
      additionalProperties: {}
      description: |-
        腾讯云 ASR，具体协议详见[腾讯云官方文档](https://cloud.tencent.com/document/product/1093/48982)。以下为示例：
        ```json
        "params": {
            "key": secret_key,
            "app_id": app_id,
            "secret": secret,
            "engine_model_type": "16k_zh",
            "voice_id": "TBgVFCsxdn3i2DGt",
        }
        ```
    asr_xfyun:
      title: xfyun
      type: object
      additionalProperties: {}
      description: |-
        讯飞云传统语音转写识别服务，具体协议详见[讯飞官方文档](https://www.xfyun.cn/doc/spark/asr_llm/rtasr_llm.html)。以下为示例：
        ```json
        "params": {
            "api_key": "XFYUN_ASR_API_KEY",
            "app_id": "XFYUN_ASR_APP_ID",
            "api_secret": "XFYUN_ASR_API_SECRET",
            "language": "zh_cn"
        }
        ```
    asr_xfyun_bigmodel:
      title: xfyun_bigmodel
      type: object
      additionalProperties: {}
      description: |-
        讯飞云语音识别大模型服务，具体协议详见[讯飞官方文档](https://www.xfyun.cn/doc/spark/asr_llm/rtasr_llm.html)。以下为示例：
        ```json
        "params": {
            "api_key": "XFYUN_ASR_BIGMODEL_API_KEY",
            "app_id": "XFYUN_ASR_BIGMODEL_APP_ID",
            "api_secret": "XFYUN_ASR_BIGMODEL_API_SECRET",
            "language_name": "cn",
            "language":"mix"
        }
        ```
    asr_xfyun_dialect:
      title: xfyun_dialect
      type: object
      additionalProperties: {}
      description: |-
        讯飞云方言自由说识别服务，具体协议详见[讯飞官方文档](https://www.xfyun.cn/doc/spark/asr_llm/rtasr_llm.html)。以下为示例：
        ```json
        "params": {
            "app_id": "XFYUN_ASR_DIALOG_APP_ID",
            "access_key_id": "XFYUN_ASR_DIALOG_ACCESS_KEY_ID",
            "access_key_secret":"XFYUN_ASR_DIALOG_ACCESS_KEY_SECRET",
            "language": "zh-CN"
        }
        ```
    asr_microsoft:
      title: Microsoft
      type: object
      additionalProperties: {}
      description: |-
        微软 ASR。以下为示例：
        ```json
        "params": {
            "key": "<your_microsoft_key>",
            "region": "chinaeast2",
            "language": "zh-CN",
            "phrase_list": ["agora", "fengming"],
        }
        ```
        - `key`：（必需）String。微软 ASR 服务的 API key。
        - `region`：（必需）String。微软 ASR 服务的区域。详见[支持的区域](https://learn.microsoft.com/en-us/azure/ai-services/speech-service/language-support?tabs=stt)。
        - `language`：（必需）String。语言。详见[支持的语言](https://learn.microsoft.com/en-us/azure/ai-services/speech-service/language-support?tabs=stt)。
        - `phrase_list`：（可选）Array[String]。热词列表。
    avatar_params:
      title: params
      description: |-
        数字人配置参数。不同数字人供应商下该参数结构不同。
        > 各供应商示例代码中未提及的参数，声网对话式 AI 引擎不保证完全支持。
      oneOf:
        - $ref: '#/components/schemas/avatar_sensetime'
    avatar_sensetime:
      title: Sensetime
      type: object
      additionalProperties: {}
      description: |-
        商汤数字人配置参数，具体协议详见[商汤官方文档](https://aigc.softsugar.com/html/help/5-%E7%9B%B4%E6%92%AD.html#%E7%9B%B4%E6%92%AD%E8%84%9A%E6%9C%ACjson%E5%AE%9A%E4%B9%89%E8%AF%B4%E6%98%8E)。以下为示例：
        ```json
        "params": {
            "agora_token": "agora_token",
            "agora_uid": "agora_uid",
            "appId": "sensetime_app_id",
            "app_key": "sensetime_app_key",
            "sceneList": [
                {
                    "digital_role": {
                        "face_feature_id": "face_feature_id",
                        "position": {"x": 0, "y": 0},
                        "url": "https://example-digital-human-models/avatar_id.zip"
                    }
                }
            ]
        }
        ```
        > - 以下商汤数字人配置字段当前不支持在 `params` 中透传：`tts_config`、`tts_query`、`audios`、`quick_response`、`quick_response_preload_list`、`opening_words`。
        > - `agora_uid` 必须为大小不超过 32 位(`0` 到 `2^32-1`))的纯数字字符串，例如 `"1234"`。
    filler_words_trigger_config:
      title: config
      description: |-
        垫词触发配置参数。不同触发模式下该参数名称和结构不同。
        > - 传入的配置类型需要和 `mode` 相匹配。例如 `mode` 为 `"fixed_time"` 时，需传入 `fixed_time_config` 对应的配置。
        > - 不可同时传入多个模式配置。
      oneOf:
        - $ref: '#/components/schemas/filler_words_trigger_fixed_time_config'
        # - $ref: '#/components/schemas/filler_words_trigger_semantic_config'
    filler_words_trigger_fixed_time_config:
      title: fixed_time_config
      type: object
      description: |-
        固定时间触发配置。以下为示例：
        ```json
        "config": {
            "response_wait_ms": 1500
        }
        ```
      properties:
        response_wait_ms:
          type: integer
          description: LLM 响应等待阈值 (ms)，取值范围为 [100, 10000]。当 LLM 处于等待状态（例如等待 RAG 检索结果、工具调用结果）的持续时间达到该阈值且未生成响应内容时，触发垫词播报。
          default: 1500
    # filler_words_trigger_semantic_config:
    #   title: semantic_config
    #   type: object
    #   description: |-
    #     语义触发配置（未来支持）。以下为示例：
    #     ```json
    #     "config": {
    #     }
    #     ```
    #   properties: {}
    filler_words_content_config:
      title: config
      description: |-
        垫词内容配置参数。不同内容模式下该参数名称和结构不同。
        > - 传入的配置类型需要和 `mode` 相匹配。例如 `mode` 为 `"static"` 时，需传入 `static_config` 对应的配置。
        > - 不可同时传入多个模式配置。
      oneOf:
        - $ref: '#/components/schemas/filler_words_content_static_config'
        # - $ref: '#/components/schemas/filler_words_content_generated_config'
    filler_words_content_static_config:
      title: static_config
      type: object
      description: |-
        静态垫词配置。以下为示例：
        ```json
        "static_config": {
            "phrases": [
                "请稍等。",
                "好的。",
                "嗯嗯。"
            ],
            "selection_rule": "shuffle"
        }
        ```
      properties:
        phrases:
          type: array
          description: |-
            垫词短语列表。
            > - 最多支持 100 个垫词。
            > - 每个垫词长度不超过 50 个中文字符或 50 个英文单词。
          items:
            type: string
          maxItems: 100
        selection_rule:
          type: string
          description: |-
            垫词选择规则，支持以下值：
            - `"shuffle"`：随机打乱。在所有垫词都被使用完一轮前，已使用的垫词不会重复播报；只有所有垫词播报完后，才会重新随机打乱并开始新的一轮。
            - `"round_robin"`：轮询。从垫词列表中顺序选取并播报，所有垫词播报完一轮后，开始新的循环播报。
          enum:
            - shuffle
            - round_robin
          default: shuffle
    # filler_words_content_generated_config:
    #   title: generated_config
    #   type: object
    #   description: |-
    #     动态生成垫词配置（未来支持）。以下为示例：
    #     ```json
    #     "config": {
    #         "llm_provider": "tongyi_qianwen",
    #         "prompt": "生成一个5字以内的简短回应，表示正在处理中",
    #         "fallback_strategy": "none",
    #         "generation_timeout_ms": 2000
    #     }
    #     ```
    #   properties:
    #     llm_provider:
    #       type: string
    #       description: |-
    #         用于生成垫词的 LLM 供应商，支持以下值：
    #         - `"tongyi_qianwen"`：通义千问。
    #         - `"openai"`：OpenAI。
    #     prompt:
    #       type: string
    #       description: 生成垫词的 Prompt 指令。例如："生成一个 5 字以内的简短回应，表示正在处理中"。
    #     fallback_strategy:
    #       type: string
    #       description: |-
    #         生成失败时的降级策略，支持以下值：
    #         - `"none"`：不降级，不播报垫词。
    #       enum:
    #         - none
    #     generation_timeout_ms:
    #       type: integer
    #       description: 生成超时时间 (ms)，取值范围为 [100, 5000]。超时后将根据 `fallback_strategy` 处理。
    #       default: 2000
    #       minimum: 100
    #       maximum: 5000
    start_of_speech_config:
      title: '{mode}_config'
      description: |-
        对话开始检测配置参数。不同检测模式下该参数结构和支持的字段不同。
        你需要根据 `mode` 传入对应的配置字段。例如 `mode` 为 `"vad"` 时，需传入 `vad_config`。不可同时传入多个模式配置。
      oneOf:
        - $ref: '#/components/schemas/start_of_speech_vad_config'
        - $ref: '#/components/schemas/start_of_speech_keywords_config'
        - $ref: '#/components/schemas/start_of_speech_disabled_config'
    start_of_speech_vad_config:
      title: vad_config
      type: object
      description: |-
        基于 VAD 的对话开始检测配置。以下为示例：
        ```json
        "vad_config": {
            "interrupt_duration_ms": 160,
            "speaking_interrupt_duration_ms": 160,
            "prefix_padding_ms": 800,
        }
        ```
      properties:
        interrupt_duration_ms:
          type: integer
          description: 智能体空闲或倾听时的人声持续阈值 (ms)，取值范围为 [120, 1200]。持续检测到人声信号的最小时间长度，避免误打断。
          default: 160
        speaking_interrupt_duration_ms:
          type: integer
          description: 智能体说话时的人声持续阈值 (ms)，取值范围为 [120, 1200]。持续检测到人声信号的最小时间长度，避免误打断。通常设置得比 `interrupt_duration_ms` 更长，以避免智能体说话时被较短人声误打断。
          default: 160
        prefix_padding_ms:
          type: integer
          description: 前缀填充阈值 (ms)，取值范围为 [0, 5000]。开始新的语音片段所需的最短语音持续时间，避免非常短的声音触发语音活动检测。
          default: 800
        # ignored_words:
        #   type: array
        #   description: |-
        #     忽略词列表。使用语义模块识别这些词语，当检测到这些词语时不触发对话开始（例如："嗯嗯"、"好的"、"uh-huh"、"okay"）。
        #     > - 忽略词的识别能力与你所选择的 ASR 供应商有关。
        #     > - 最多支持设置 128 个忽略词。
        #   items:
        #     type: string
        #   maxItems: 128
    start_of_speech_keywords_config:
      title: keywords_config
      type: object
      description: |-
        基于关键词的对话开始检测配置（Beta）。以下为示例：
        ```json
        "keywords_config": {
            "interrupt_duration_ms": 160,
            "prefix_padding_ms": 800,
            "triggered_keywords": ["你好", "在吗", "hello"]
        }
        ```
      properties:
        interrupt_duration_ms:
          type: integer
          description: 人声持续阈值 (ms)，取值范围为 [120, 1200]。持续检测到人声信号的最小时间长度，避免误打断。
          default: 160
        prefix_padding_ms:
          type: integer
          description: 前缀填充阈值 (ms)，取值范围为 [0, 5000]。开始新的语音片段所需的最短语音持续时间，避免非常短的声音触发语音活动检测。
          default: 800
        triggered_keywords:
          type: array
          description: |-
            打断关键词列表，智能体听到列表中的关键词后会打断智能体当前行为。
            > - 关键词的识别能力（例如能否识别多语种词语或方言）与你所选择的 ASR 供应商有关。
            > - 支持设置最多 128 个关键词。
          items:
            type: string
          maxItems: 128
    start_of_speech_semantic_config:
      title: semantic_config
      type: object
      description: |-
        基于语义的对话开始检测配置。以下为示例：
        ```json
        "semantic_config": {
            "interrupt_duration_ms": 160,
            "prefix_padding_ms": 800,
        }
        ```
      properties:
        interrupt_duration_ms:
          type: integer
          description: 人声持续阈值 (ms)，取值范围为 [120, 1200]。持续检测到人声信号的最小时间长度，避免误打断。
          default: 160
        prefix_padding_ms:
          type: integer
          description: 前缀填充阈值 (ms)，取值范围为 [0, 5000]。开始新的语音片段所需的最短语音持续时间，避免非常短的声音触发语音活动检测。
          default: 800
        # ignored_words:
        #   type: array
        #   description: |-
        #     忽略词列表。使用语义模块识别这些词语，当检测到这些词语时不触发对话开始（例如："嗯嗯"、"好的"）。
        #     > - 该字段为可选。若不设置，则只要语义触发就会开始对话。
        #     > - 若设置了该字段，则只有在不匹配忽略词且语义触发的情况下才会开始对话。
        #     > - 忽略词的识别能力与你所选择的 ASR 供应商有关。
        #     > - 最多支持设置 128 个忽略词。
        #   items:
        #     type: string
        #   maxItems: 128
    start_of_speech_disabled_config:
      title: disabled_config
      type: object
      description: |-
        禁用对话开始检测配置。以下为示例：
        ```json
        "disabled_config": {
            "strategy": "append"
        }
        ```
      properties:
        strategy:
          type: string
          description: |-
            智能体交互（说话或思考）时，人声的处理策略，支持以下值：
            - `"append"`：追加模式，人声不打断智能体。智能体会在当前交互结束后处理刚才收到的人声请求。
            - `"ignored"`：忽略模式，智能体忽略人声请求。如果智能体正在说话或思考中途收到人声，智能体会直接忽略并丢弃人声请求，不存入上下文。
          enum:
            - append
            - ignored
    end_of_speech_config:
      title: '{mode}_config'
      description: |-
        对话结束检测配置参数。不同检测模式下该参数结构和支持的字段不同。
        你需要根据 `mode` 传入对应的配置字段。例如 `mode` 为 `"vad"` 时，需传入 `vad_config`。不可同时传入多个模式配置。
      oneOf:
        - $ref: '#/components/schemas/end_of_speech_vad_config'
        - $ref: '#/components/schemas/end_of_speech_semantic_config'
    end_of_speech_vad_config:
      title: vad_config
      type: object
      description: |-
        基于 VAD 的对话结束检测配置。以下为示例：
        ```json
        "vad_config": {
            "silence_duration_ms": 640
        }
        ```
      properties:
        silence_duration_ms:
          type: integer
          description: 静音持续阈值 (ms)，取值范围为 [0, 2000]。语音结束时的最短静音持续时间，确保短暂的停顿不会过早结束语音片段。
          default: 640
    end_of_speech_semantic_config:
      title: semantic_config
      type: object
      description: |-
        基于语义的对话结束检测配置。以下为示例：
        ```json
        "semantic_config": {
            "silence_duration_ms": 320,
            "max_wait_ms": 3000
        }
        ```
      properties:
        silence_duration_ms:
          type: integer
          description: 静音持续阈值 (ms)，取值范围为 [0, 2000]。语音结束时的最短静音持续时间，确保短暂的停顿不会过早结束语音片段。
          default: 320
        max_wait_ms:
          type: integer
          description: 最大等待时间 (ms)，取值范围为 [0, 10000]。等待语义判定的最长时间，超时后将基于当前状态判定对话是否结束。
          default: 3000
    phone_number_object:
      title: phone_number_object
      type: object
      description: 电话号码对象，包含电话号码的详细信息。
      properties:
        provider:
          type: string
          description: |
            号码提供商，可选以下值：
            - `"byo"`：BYO（Bring Your Own）。
            - `"aliyun"`：阿里云。
        phone_number:
          type: string
          description: E.164 格式的电话号码，作为唯一标识符。
        label:
          type: string
          description: 用于标识该号码的标签。
        inbound:
          type: boolean
          description: 号码是否支持内呼。
        outbound:
          type: boolean
          description: 号码是否支持外呼。
        associated_pipeline:
          type: object
          nullable: true
          description: 关联的 pipeline 信息，或为 `null`。
          properties:
            pipeline_id:
              type: string
              description: Pipeline ID。
            pipeline_name:
              type: string
              description: Pipeline 名称。
        inbound_config:
          type: object
          nullable: true
          description: SIP 内呼配置详情，或为 `null`。
        outbound_config:
          type: object
          nullable: true
          description: SIP 外呼配置详情，或为 `null`。
  securitySchemes:
    Basic Auth:
      type: http
      scheme: basic
      description: '发送 HTTP 请求时，你需要通过 Basic HTTP 认证，并将生成的凭证填入 HTTP 请求头部的 `Authorization` 字段。具体生成 `Authorization` 字段的方法请参考[实现 HTTP 安全认证](https://doc.shengwang.cn/doc/convoai/restful/user-guides/http-basic-auth)。'
security:
  - {}
  - Basic Auth: []
