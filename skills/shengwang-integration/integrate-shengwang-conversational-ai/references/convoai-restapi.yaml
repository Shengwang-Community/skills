                      description: |-
                        对话轮次检测设置，用于控制语音活动检测和对话轮次判定逻辑。
                        
                         该配置支持多种检测模式组合：
                         - **Start of Speech (SoS)**：支持 VAD、关键词、禁用三种模式。
                         - **End of Speech (EoS)**：支持 VAD 和语义两种模式。
                      properties:
                        mode:
                          type: string
                          
                          description: |-
                            对话轮次检测模式，当前支持以下值：
                            - `"default"`：（默认）默认模式，使用标准的对话轮次检测配置。
                          enum:
                            - default
                          default: default
                        config:
                          type: object
                          
                          description: 对话轮次检测详细配置。
                          properties:
                            speech_threshold:
                              type: number
                              description: 语音识别灵敏度，取值范围为 (0.0, 1.0)。决定音频信号中何种程度的声音被视为"语音活动"。较低的值会使智能体更容易检测到语音，较高的值则可能忽略微弱声音。
                              format: float
                              default: 0.5
                            start_of_speech:
                              type: object
                              description: 对话开始 (Start of Speech, SoS) 检测配置，用于判定用户何时开始说话。
                              properties:
                                mode:
                                  type: string
                                  description: |-
                                    对话开始检测模式，支持以下值：
                                    - `"vad"`：基于 VAD（语音活动检测）触发，使用音频信号检测。
                                    - `"keywords"`：（Beta）基于关键词触发，智能体听到指定关键词后触发对话开始。
                                    - `"disabled"`：禁用对话开始检测，不主动触发打断。
                                '{mode}_config':
                                  $ref: '#/components/schemas/start_of_speech_config'
                                  description: |
                                    对话开始检测配置参数。根据 `mode` 传入对应的配置字段
                            end_of_speech:
                              type: object
                              description: 对话结束 (End of Speech, EoS) 检测配置，用于判定用户何时结束说话。
                              properties:
                                mode:
                                  type: string
                                  description: |-
                                    对话结束检测模式，支持以下值：
                                    - `"vad"`：基于 VAD（语音活动检测）触发，检测静音持续时间。
                                    - `"semantic"`：基于语义触发，使用语义理解模块判定对话结束。
                                '{mode}_config':
                                  $ref: '#/components/schemas/end_of_speech_config'
                                  description: |
                                    对话结束检测配置参数。根据 `mode` 传入对应的配置字段。
                    sal:
                      type: object
                      description: |-
                        选择性注意力锁定（Selective Attention Locking, SAL）配置。
                        > 该功能目前处于 Beta 阶段。
                      properties:
                        sal_mode: 
                          type: string
                          description: |-
                            选择性注意力锁定模式，支持以下选项：
                            - `"locking"`：（默认）主讲人锁定模式。智能体锁定主讲人，屏蔽 95% 的环境人声、噪声。该模式可通过两种方式启用：
                              - 无感识别：用户在对话初期大声、清晰地说话，智能体即可自动将用户识别为主讲人。
                              - 预注册：创建智能体时，通过 `sample_urls` 字段预注册一名主讲人的声纹 URL，智能体将根据预注册的声纹 URL 锁定主讲人。
                            - `"recognition"`：声纹识别模式。你可以通过 `sample_urls` 字段预注册声纹 URL，目前仅支持单声纹注册。智能体将识别不同的说话人并抑制其他背景人声和环境噪音。识别到的说话人身份会通过 `metadata` 字段里的 `vpids` 字段标识并发送给 LLM，你需要将 `llm.vendor` 设置为 `"custom"`，并参考[自定义大模型](/doc/convoai/restful/user-guides/custom-llm)了解如何让 LLM 处理说话人信息。
                          default: "locking"
                        sample_urls:
                          type: object
                          description: |-
                            注册声纹 URL，为键值对形式，键为注册的声纹名称，值为对应说话者的声纹 URL 下载地址。
                            > - 传入的声纹名称不可设置为 `"unknown"`，这是一个保留关键字，用于标识未知说话人。
                            > - 对于注册的声纹，需满足以下条件：
                            >   - 数量: 每个任务请求的注册声纹URL数量，目前仅支持单声纹，数量为 1 个。
                            >   - 大小: 单个声纹文件不得超过 2 MB。
                            >   - 时长：时长为 10 到 15 秒, 其中有效音频不小于 8 秒（不能有太多静音段）。
                            >   - 格式: 必须为 16k 采样率、16bit 位深、单声道的 PCM 音频文件，文件名后缀必须为 `.pcm`。
                    labels:
                      type: object
                      description: |-
                        自定义标签，键值对形式，键为标签名，值为标签值。用于让智能体携带自定义业务信息。
                        
                        这些自定义信息会与智能体绑定，并在对话式 AI 引擎所有类型消息通知回调的 `payload` 字段中返回，可用于实现自定义业务逻辑，例如标记活动 ID、客户分组、业务场景等。
                      additionalProperties:
                        type: string
                    rtc:
                      type: object
                      description: RTC 媒体内容加密配置。
                      properties:
                        encryption_key:
                          type: string
                          description: |-
                            字符串类型的加密密钥，长度不受限制。声网建议使用 32 字节的密钥。
                            > 如果未设置加密密钥或将其设置为空，则无法使用内置加密。
                        encryption_salt:
                          type: string
                          description: |-
                            用于加密的盐值，Base64 编码的字符串，解码后长度为 32 字节。
                            > 该参数仅在 `encryption_mode` 设为 `7`（AES_128_GCM2）或 `8`（AES_256_GCM2）时生效。在此情况下，请确保该参数不为空。
                        encryption_mode:
                          type: integer
                          description: |-
                            内置加密模式，支持以下值：
                            - `1`: AES_128_XTS - 128 位 AES 加密，XTS 模式。
                            - `2`: AES_128_ECB - 128 位 AES 加密，ECB 模式。
                            - `3`: AES_256_XTS - 256 位 AES 加密，XTS 模式。
                            - `4`: SM4_128_ECB - 128 位 SM4 加密，ECB 模式。
                            - `5`: AES_128_GCM - 128 位 AES 加密，GCM 模式。
                            - `6`: AES_256_GCM - 256 位 AES 加密，GCM 模式。
                            - `7`: AES_128_GCM2 - 128 位 AES 加密，GCM 模式。该模式需设置 salt（`encryption_salt`）。
                            - `8`: AES_256_GCM2 - 256 位 AES 加密，GCM 模式。该模式需设置 salt（`encryption_salt`）。
                            
                            > 声网建议使用 `7`（AES_128_GCM2）或 `8`（AES_256_GCM2）模式，这两种模式支持使用加密盐以提升安全性。
                    filler_words:
                      type: object
                      description: |-
                        垫词功能 (Beta) 配置，用于在 LLM 响应等待时播报垫词，缓解用户等待焦虑，提升对话流畅度。
                        
                        垫词播报遵循以下规则：
                        - **播报顺序**：当多个垫词或 LLM 响应等待播报时，按照文本到达的先后顺序进行播报。
                        - **打断控制**：继承全局配置中的打断模式设置 (`turn_detection.config`)。
                      properties:
                        enable:
                          type: boolean
                          description: |-
                            是否启用垫词功能：
                            - `true`：启用。
                            - `false`：（默认）不启用。
                          default: false
                        trigger:
                          type: object
                          description: 垫词触发配置，定义何时触发垫词播报。
                          properties:
                            mode:
                              type: string
                              description: |-
                                垫词触发模式，支持以下值：
                                - `"fixed_time"`：固定时间触发。当 LLM 响应等待时间超过设定阈值时触发垫词播报。
                            '{mode}_config':
                              $ref: '#/components/schemas/filler_words_trigger_config'
                              description: |
                                垫词触发配置参数。根据 `mode` 选择对应的配置。
                        content:
                          type: object
                          description: 垫词内容配置，定义垫词的来源和选择规则。
                          properties:
                            mode:
                              type: string
                              description: |-
                                垫词内容模式，支持以下值：
                                - `"static"`：静态垫词。使用预定义的垫词列表。
                            '{mode}_config':
                              $ref: '#/components/schemas/filler_words_content_config'
                              description: |
                                垫词内容配置参数。根据 `mode` 选择对应的配置。
                    parameters:
                      type: object
                      description: 智能体参数配置。
                      properties:
                        silence_config:
                          type: object
                          
                          description: 智能体静默设置。
                          properties:
                            timeout_ms:
                              type: integer
                              description: "智能体最大静默时间 (ms)，取值范围为 [0,60000]。智能体创建成功，且用户加入频道后，智能体不处于倾听、思考或说话状态的持续时间称为智能体静默时间。静默时间达到设定值后，智能体将播报静默提示消息。该功能可用于在用户不活跃时让智能体提醒用户。\r\n- 设置为 `0`（默认值）：表示不启用该功能。\r\n- 设置为 `(0,60000]` 时，必需同时设置 `content` 才能正常播报静默提示，否则设置无效。"
                            action:
                              type: string
                              description: "静默时间达到设定值后，智能体采取的行为，可设为以下值：\r\n- `\"speak\"`：（默认）使用 TTS 模块播报静默提示内容 (`content`)。\r\n- `\"think\"`：将静默提示内容 (`content`) 追加在上下文的最后，并传递给 LLM。"
                            content:
                              type: string
                              description: 静默提示消息的内容。设置的内容会根据 `action` 中的设置以不同的方式使用。
                        farewell_config:
                          type: object
                          description: 智能体优雅挂断设置。
                          properties:
                            graceful_enabled:
                              type: boolean
                              description: |-
                                是否启用优雅退出（Graceful Leave）功能：
                                - `true`：启用。开启后，调用 [POST 停止对话式智能体](/doc/convoai/restful/convoai/operations/stop-agent)接口，让智能体退出频道时，会确保智能体处于静默状态（`IDLE`）后再离开频道。
                                - `false`：（默认）不启用。
                              default: false
                            graceful_timeout_seconds:
                              type: integer
                              description: 优雅退出超时时间 (s)，表示在退出频道前等待智能体进入静默状态（`IDLE`）的最长时间，超出该时间后，即便智能体不处于静默状态，也会立即退出频道。该字段仅在 `graceful_enabled` 为 `true` 时生效，取值范围为 [0,120]。
                              default: 30
                        data_channel:
                          type: string
                          
                          description: "智能体数据传输通道，可选以下值：\r\n- `rtm`：使用 RTM 传输。该配置仅在 `advanced_features.enable_rtm` 为 `true` 时生效。 \r\n- `datastream`：（默认）使用 RTC 的 [`DataStream`](https://doc.shengwang.cn/api-ref/rtc/android/API/toc_datastream#callback_irtcengineeventhandler_onstreammessage) 传输。"
                        enable_metrics:
                          type: boolean
                          
                          default: false
                          description: |-
                            是否接收智能体性能数据：
                            - `true`：接收。
                            - `false`：（默认）不接收。
                            
                            该配置仅在 `advanced_features.enable_rtm` 为 `true` 时生效。你可以参考[监听智能体事件](/doc/convoai/restful/user-guides/listen-agent-events)了解如何使用客户端组件接收智能体性能数据，或参考[接收 Webhook 事件](/doc/convoai/restful/webhook/enable-ncs)了解如何使用 Webhook 接收智能体性能数据。
                        enable_error_message:
                          type: boolean
                          default: false
                          description: |-
                            是否接收智能体错误事件：
                            - `true`：接收。
                            - `false`：（默认）不接收。
                            
                            该配置仅在 `advanced_features.enable_rtm` 为 `true` 时生效。你可以参考[监听智能体事件](/doc/convoai/restful/user-guides/listen-agent-events)了解如何使用客户端组件接收智能体错误事件。
                        # ifttt:
