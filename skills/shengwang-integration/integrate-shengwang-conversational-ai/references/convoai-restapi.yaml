openapi: 3.1.0
info:
  version: ''
  title: 对话式智能体 API 概述
  description: |-
    本文介绍声网对话式智能体服务 RESTful API 的基本信息。

    ## 数据格式

    所有 HTTP 请求头部的 Content-Type 类型为 `application/json`。所有请求和响应内容的格式均为 JSON。
servers:
  - url: 'https://api.agora.io/cn/api/conversational-ai-agent'
    description: ''
paths:
  '/v2/projects/{appid}/join':
    post:
      # tags:
      #   - 智能体管理
      summary: 创建对话式智能体
      description: 创建一个对话式智能体(Conversational AI agent)实例，并加入一个 RTC 频道。
      operationId: start-agent
      parameters:
        - $ref: '#/components/parameters/appid'
      requestBody:
        content:
          application/json:
            schema:
              type: object
              required:
                - name
                - properties
              properties:
                name:
                  type: string
                  description: 智能体唯一标识，相同标识不可重复创建。
                properties:
                  type: object
                  description: 智能体详细配置。
                  required:
                    - channel
                    - agent_rtc_uid
                    - remote_rtc_uids
                    - tts
                    - llm
                  properties:
                    channel:
                      type: string
                      description: 智能体加入的 RTC 频道名。
                    token:
                      type: string
                      description: '加入 RTC 频道使用的 Token，即用于鉴权的动态密钥（Token）。如果你的项目已启用 App 证书，则务必在该字段中传入你项目的动态密钥。详见[使用 Token 鉴权](https://doc.shengwang.cn/doc/rtc/android/basic-features/token-authentication)。'
                    agent_rtc_uid:
                      type: string
                      description: 智能体在 RTC 频道内的用户 ID。填 `"0"` 时表示随机分配，但 Token 需要相应修改。
                    remote_rtc_uids:
                      type: array
                      description: '智能体在 RTC 频道中订阅的用户 ID 列表，只有订阅的用户才能与智能体互动。目前只支持订阅一个用户 ID。 '
                      items:
                        type: string
                    agent_rtm_uid:
                      type: string
                      description: |-
                        > 该字段已废弃，请参考 [FAQ](https://doc.shengwang.cn/faq/integration-issues/generate-token) 生成同时具备 RTC 和 RTM 权限的 Token，之后改用 `token` 字段。

                        智能体在 RTM 频道内的用户 ID。仅在 `advanced_features.enable_rtm` 为 `true` 时生效。
                    enable_string_uid:
                      type: boolean
                      default: false
                      description: |
                        是否启用 String UID：
                        - `true`：智能体和订阅用户 ID 均使用 String UID。
                        - `false`：（默认）智能体和订阅用户 ID 均使用 Int UID。
                        > 同一频道内，Int 型和 String 型的用户 ID 不可混用。更多使用 String UID 的相关信息请参考[如何使用 String 型用户 ID](https://doc.shengwang.cn/faq/integration-issues/string-uid)。
                    idle_timeout:
                      type: integer
                      description: RTC 频道的最大空闲时间 (s)。检测到 `remote_rtc_uids` 中指定的用户全部离开频道后的时间视为频道空闲时间，超过设定的最大值时，频道的智能体将自动停止并退出频道。如果填写为 `0`，则直到手动退出，智能体才会停止。
                      default: 30
                    silence_timeout:
                      type: integer
                      default: 0
                      description: |-
                        > 该字段已废弃，请改用 `parameters.silence_config`。

                        智能体最大静默时间 (s)，取值范围为 [0,60]。智能体创建成功，且用户加入频道后，智能体不处于倾听、思考或说话状态的持续时间称为智能体静默时间。静默时间达到设定值后，智能体将播报 `llm.silence_message` 中填写的静默提示消息，之后重新计算静默时间。
                        - 设置为 `0`（默认值）：表示不启用该功能。
                        - 设置为 (0,60] 时，必需同时设置 `llm.silence_message` 才能正常播报静默提示消息，否则设置无效。
                    advanced_features:
                      type: object
                      description: 高级功能配置。
                      properties:
                        enable_aivad:
                          type: boolean
                          default: false
                          description: |-
                            > 该字段已废弃，请改用 `turn_detection.config.end_of_speech.mode.semantic` 实现。
                        enable_rtm:
                          type: boolean
                          description: |-
                            是否启用实时消息 RTM 服务。启用后智能体会自动登录 RTM 并订阅 `channel` 中指定的频道，可结合 RTM 提供的能力实现一些进阶功能，例如[传递自定义信息](https://doc.shengwang.cn/doc/convoai/restful/user-guides/custom-data)。

                            > 启用 RTM 服务前需要确保 Token 同时具备 RTC 和 RTM 权限。智能体加入 RTM 频道会复用 `token` 字段配置的 Token。你可以参考 [FAQ](https://doc.shengwang.cn/faq/integration-issues/generate-token) 了解如何生成同时具备 RTC 和 RTM 权限的 Token。
                          default: false
                        enable_sal:
                          type: boolean
                          description: |-
                            是否启用选择性注意力锁定（Selective Attention Locking, SAL）功能。启用后，在 `sal` 字段中完成相关设置，智能体即可识别用户的声纹特征，有效区分不同说话者，屏蔽 95% 的环境人声、噪声。
                            > 该功能目前处于 Beta 阶段。
                          default: false
                        enable_tools:
                          type: boolean
                          description: |-
                            是否启用工具调用功能。启用后，智能体可以调用 MCP 服务器提供的工具，实现更复杂的业务逻辑。
                          default: false
                    asr:
                      type: object
                      description: 自动语音识别 (ASR) 配置。
                      properties:
                        language:
                          type: string
                          description: "用户与智能体互动时使用的语言：\r\n- `zh-CN`：中文（支持中英文混合）\r\n- `en-US`：英语"
                          default: zh-CN
                        vendor:
                          type: string
                          description: |-
                            ASR 服务供应商，可选以下值：
                            - `fengming`：（默认）声网凤鸣 ASR。
                            - `tencent`：腾讯 ASR。
                            - `microsoft`：微软 ASR。
                            - `xfyun`：讯飞云传统语音转写识别服务。
                            - `xfyun_bigmodel`：讯飞云语音识别大模型服务。
                            - `xfyun_dialect`：讯飞云方言自由说识别服务。
                        params:
                          $ref: '#/components/schemas/asr_params'
                          description: |
                            指定 ASR 供应商的配置参数。
                            > 你可以参考调用示例中不同 ASR 供应商的参数填写样例。
                    tts:
                      type: object
                      description: 文本转语音 (TTS) 模块配置。
                      required:
                        - vendor
                        - params
                      properties:
                        vendor:
                          type: string
                          description: |
                            TTS 供应商，支持传入以下值：
                            - `minimax`：Minimax TTS
                            - `tencent`：腾讯 TTS
                            - `bytedance`：火山引擎 TTS
                            - `microsoft`：微软 Azure TTS
                            - `cosyvoice`：阿里云 CosyVoice TTS
                            - `bytedance_duplex`：火山引擎双向流式 TTS
                            - `stepfun`：阶跃星辰 TTS
                        skip_patterns:
                          type: array
                          description: |
                            过滤模式配置，用于控制是否跳过 LLM 返回文本中括号内的内容，避免智能体播报不必要的结构性提示信息如语气、动作描述等。默认值为 `[]`，即不过滤任何内容。可选值如下，传入即启用该功能：
                            
                            - `1`：跳过中文圆括号（ ）中的内容
                            - `2`：跳过中文方括号【 】中的内容
                            - `3`：跳过英文圆括号 ( ) 中的内容
                            - `4`：跳过英文方括号 [ ] 中的内容
                            - `5`：跳过英文花括号 \{ } 中的内容

                            > - 当输入文本中存在嵌套括号，且多种括号类型都被配置为跳过时，智能体只处理最外层括号，即系统将从文本的起始位置开始匹配，一旦找到第一个符合跳过规则的最外层括号对，该括号对及其包含的所有内容（包括任何嵌套的其他类型括号）都将被整体跳过。
                            > - 无论是否打开[实时字幕](https://doc.shengwang.cn/doc/convoai/restful/user-guides/realtime-sub)，智能体短期记忆都会包含被过滤的内容，即 LLM 生成的完整文本。
                            > - 开启[实时字幕](https://doc.shengwang.cn/doc/convoai/restful/user-guides/realtime-sub)时，实时字幕在 TTS 播报时不会包含被过滤的内容，等这句话播报完毕后，字幕会把这些内容添加回来。
                            > - 火山引擎双向流式 TTS 暂不支持该功能。
                          items:
                            type: integer
                          default: []
                        params:
                          $ref: '#/components/schemas/tts_params'
                          description: |
                            指定 TTS 供应商的配置参数。
                            > 你可以参考调用示例中不同 TTS 供应商的参数填写样例。
                    llm:
                      type: object
                      description: 大语言模型 (LLM) 配置。
                      required:
                        - url
                      properties:
                        url:
                          type: string
                          description: LLM 回调地址，要求与 OpenAI 协议兼容。
                        api_key:
                          type: string
                          description: LLM 校验 api key。默认为空，生产环境中务必启用 api key。
                        system_messages:
                          type: array
                          description: 一组每次调用 LLM 时被附加在最前的预定义信息，用于控制 LLM 输出。可以是角色设定、提示词和回答样例等。要求与 OpenAI 协议兼容。
                          items:
                            type: object
                            additionalProperties: {}
                        params:
                          type: object
                          
                          description: 在消息体内传输的 LLM 附加信息，例如使用的模型、最大 Token 数限制等。不同的 LLM 供应商支持的配置不同，请参考对应文档按需填入。
                          additionalProperties: {}
                        max_history:
                          $ref: '#/components/schemas/max_history'
                        input_modalities:
                          type: array
                          
                          description: "LLM 的输入模态，支持：\r\n- `[\"text\"]`：（默认）仅文字。\r\n- `[\"text\", \"image\"]`：文字加图片，要求所选 LLM 支持视觉模态输入。"
                          items:
                            type: string
                            default: text
                        output_modalities:
                          type: array
                          
                          description: "LLM 的输出模态，支持：\r\n- `[\"text\"]`：（默认）仅文字。输出的文字会经过 TTS 模块转换成语音后发布至 RTC 频道。\r\n- `[\"audio\"]`：仅语音。语音会直接发布至 RTC 频道。\r\n- `[\"text\", \"audio\"]`：文字加语音。你可以自行编写逻辑，按需处理 LLM 的输出。"
                          items:
                            type: string
                        greeting_message:
                          type: string
                          description: 智能体问候语。如果填写，则在频道内没有订阅用户列表 (`remote_rtc_uids`) 中的用户时，智能体会自动向首位加入频道的订阅用户发送问候语。
                          
                        greeting_configs:
                          type: object
                          description: |
                            智能体问候语播报配置。
                          properties:
                            mode:
                              type: string
                              description: |
                                智能体问候语播报模式，支持以下选项：
                                - `"single_every"`：（默认）每次有用户加入空频道时，智能体都播报一次问候语。
                                - `"single_first"`：仅首位用户加入空频道时，智能体播报一次问候语。
                        failure_message:
                          type: string
                          description: 智能体处理失败提示语。如果填写，则在 LLM 调用错误时会通过 TTS 模块返回。
                        silence_message:
                          type: string
                          
                          description: |-
                            > 该字段已废弃，请改用 `parameters.silence_config`。

                            静默提示消息。默认为空字符串。智能体创建成功，且用户加入频道后，智能体不处于倾听、思考或说话状态的持续时间称为智能体静默时间。静默时间达到 `silence_timeout` 中设定的值后，智能体将播报静默提示消息。`silence_timeout` 设置为 `0` 时，该参数无效。
                        # style:
                        #   type: string
                        #   description: "LLM 协议，支持以下值：\r\n- `\"openai\"`（默认）\r\n- `\"dify\"`\r\n- `\"gemini\"`\r\n- `\"anthropic\"`"
                        vendor:
                          type: string
                          
                          description: |-
                            LLM 供应商，支持以下两种设置：
                            - 商业大模型供应商，支持以下值：
                              - `aliyun`：阿里云
                              - `bytedance`：字节跳动
                              - `deepseek`：深度求索
                              - `tencent`：腾讯

                              设置后，将保证最大兼容性，避免因携带了 LLM 不支持的信息导致请求失败。
                            - 自定义 LLM，即设为 `"custom"`。设置后智能体调用 custom LLM 时，除了 `role` 和 `content` 外，将额外携带以下信息：
                              - `turn_id`：唯一的对话轮次标识符。`turn_id` 从 0 开始递增，用户和智能体的一轮对话对应一个 `turn_id`。
                              - `timestamp`：请求时间戳，精度为毫秒。
                        mcp_servers:
                          type: array
                          description: MCP (Model Context Protocol) 服务器配置列表。通过配置 MCP 服务器，智能体可以调用外部服务提供的工具，实现更复杂的业务逻辑。
                          items:
                            type: object
                            required:
                              - name
                              - endpoint
                            properties:
                              name:
                                type: string
                                description: |
                                  MCP 服务器的唯一标识。长度不超过 48 字符，支持以下字符：
                                  - 所有小写英文字母：a 到 z
                                  - 所有大写英文字母：A 到 Z
                                  - 所有数字字符：0 到 9
                                  - "." 和 "-"
                              endpoint:
                                type: string
                                description: MCP 服务器的端点地址，智能体将通过该地址与 MCP 服务器通信。
                              transport:
                                type: string
                                description: |
                                  传输协议类型，支持传入以下值：
                                  - `"streamable_http"`：流式 HTTP 协议
                              headers:
                                type: object
                                description: 请求 MCP 服务器时携带的 HTTP 头部信息，例如认证信息。
                                additionalProperties:
                                  type: string
                              allowed_tools:
                                type: array
                                description: |
                                  允许智能体调用的工具列表。只有在此列表中的工具才能被智能体使用。
                                  > `allowed_tools` 字段生效规则:
                                  > - 不填写 `allowed_tools` 字段：所有工具都生效
                                  > - 填写 `allowed_tools` 字段：
                                  >    - 填写为 `[]`：所有工具不生效
                                  >    - 填写为 `["*"]`：所有工具生效
                                  >    - 填写为 `["aa", "bb", "cc"]`：`aa`、`bb`、`cc` 生效
                                  >    - 填写为 `["aa", "bb", "*"]`：所有工具生效
                                items:
                                  type: string
                              timeout_ms:
                                type: integer
                                description: MCP 服务器请求超时时间，单位为毫秒。请求超时后，智能体将不会等待 MCP 服务器响应，而是继续执行后续逻辑。
                                default: 10000
                        template_variables:
                          type: object
                          description: |-
                            动态参数配置，用于在智能体的 `system_messages`、`greeting_message`、`failure_message` 和 `parameters.silence_config.content` 文本中插入变量。键值对形式，键为变量名，值为变量值。
                            
                            **使用方式**:在 Prompt 文本中使用 `{{variable_name}}` 格式引用变量，系统会自动将其替换为 `template_variables` 中定义的对应值。
                            > 注意：变量名和变量值不支持引用其他变量。例如自定义变量 `"farewell": "期待下次再见，{{name}}"`，其中的 `{{name}}` 不会被解析。
                          additionalProperties:
                            type: string
                    avatar:
                      type: object
                      description: 数字人 (Avatar) 配置。
                      properties:
                        enable:
                          type: boolean
                          description: |
                            是否为智能体启用数字人功能：
                            - `true`：启用。启用后需配置 `vendor` 和 `params` 字段。
                            - `false`：（默认）不启用。

                            > 开启数字人功能将产生 RTC 视频通话费用，详见 [RTC 计费说明](https://doc.shengwang.cn/doc/rtc/android/billing/billing-strategy)。
                        vendor:
                          type: string
                          description: |
                            数字人供应商，支持传入以下值：
                            - `sensetime`：商汤数字人
                        params:
                          $ref: '#/components/schemas/avatar_params'
                          description: |
                            指定数字人供应商的配置参数。
                            > 你可以参考调用示例中不同数字人供应商的参数填写样例。
                    # vad:
                    #   type: object
                    #   description: |-
                    #     语音活动检测 (VAD) 配置。
                    #     > 该字段已废弃，请改用 `turn_detection` 字段。
                      # properties:
                      #   interrupt_duration_ms:
                      #     type: integer
                      #     default: 160
                      #     description: '人声持续阈值 (ms)，取值范围为 [120, 1200]。持续检测到人声信号的最小时间长度，避免误打断。'
                      #   prefix_padding_ms:
                      #     type: integer
                      #     description: '前缀填充阈值 (ms)，取值范围为 [0, 5000]。开始新的语音片段所需的最短语音持续时间，避免非常短的声音触发语音活动检测。'
                      #     default: 800
                      #   silence_duration_ms:
                      #     type: integer
                      #     description: '静音持续阈值 (ms)，取值范围为 [0, 2000]。语音结束时的最短静音持续时间，确保短暂的停顿不会过早结束语音片段。'
                      #     default: 480
                      #   threshold:
                      #     type: number
                      #     description: '语音识别灵敏度，取值范围为 (0.0,1.0)。决定音频信号中何种程度的声音被视为"语音活动"。较低的值会使智能体更容易检测到语音，较高的值则可能忽略微弱声音。'
                      #     format: float
                      #     default: 0.5
                    turn_detection:
                      type: object
                      # description: 对话轮次检测设置，主要包括语音活动检测和智能体打断逻辑的相关设置。
                      # properties:
                      #   interrupt_mode:
                      #     type: string
                      #     description: |-
                      #       智能体交互（说话或思考）时，人声打断智能体行为的模式，支持设为以下值：
                      #        - `"interrupt"`：（默认）打断模式，人声立即打断智能体交互。智能体会终止当前交互，直接处理人声输入。
                      #        - `"append"`: 追加模式，人声不打断智能体。智能体会在当前交互结束后处理刚才收到的人声请求。
                      #        - `"ignore"`: 忽略模式，智能体忽略人声请求。如果智能体正在说话或思考中途收到人声，智能体会直接忽略并丢弃人声请求，不存入上下文。"
                      #        - `"keywords"`: 关键词打断模式，智能体根据关键词打断智能体行为，需要在 `interrrupt_keywords` 字段中设置打断关键词。
                      #        - `"adaptive"`: 自适应打断模式，该模式将自动调整打断相关参数，有效避免智能体说话时被较短人声误打断。
                            
                      #       > 关键词打断模式与优雅打断功能 (`advanced_features.enable_aivad`) 互斥，不可同时开启。
                      #   interrupt_keywords:
                      #     type: array
                      #     description: |-
                      #       打断关键词列表，智能体听到列表中的关键词后会打断智能体当前行为。该字段仅在 `interrupt_mode` 设为 `keywords` 时生效。
                      #       > - 关键词的识别能力（例如能否识别多语种词语或方言）与你所选择的 ASR 供应商有关。
                      #       > - 支持设置最多 128 个关键词。
                      #   interrupt_duration_ms:
                      #     type: integer
                      #     default: 160
                      #     description: '人声持续阈值 (ms)，取值范围为 [120, 1200]。持续检测到人声信号的最小时间长度，避免误打断。'
                      #   prefix_padding_ms:
                      #     type: integer
